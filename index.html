  ball.style.scale = `${randomBetween(0.75, 1.3)}`;
  floorFur.append(ball);
}

function updateCatMoodFromStroke(speed, moveDistance) {
  const difficulty = getCurrentDifficulty();
  const calmStroke = speed >= 80 && speed <= 520;
  const roughStroke = speed > 760;
  const idleDrag = speed < 45;
  if (calmStroke) { state.comfort = clamp(state.comfort + moveDistance * 0.09, 0, 100); state.alert = clamp(state.alert - difficulty.alertDecay * 1.5, 0, 100); moodEl.textContent = state.combo >= 6 ? "很舒服" : "放松"; }
  else if (roughStroke) { state.alert = clamp(state.alert + difficulty.alertGain * (speed / 260), 0, 100); state.comfort = clamp(state.comfort - 1.4, 0, 100); state.combo = 0; moodEl.textContent = "嫌弃"; spawnHint("太快了", "#ffdf80"); }
  else if (idleDrag) { state.alert = clamp(state.alert + 0.35, 0, 100); }
  if (state.comfort >= 100) { state.comfort = 55; state.score += 5; scoreEl.textContent = String(state.score); spawnHint("舒服 +5", "#b8ffb1"); playPurrSound(); }
  updateCareMeters();
}

/* ---------- Rhythm judging ---------- */
function createRhythmPoint() {
  const rect = catZone.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
}

function judgeRhythmHit(point, inputType = null) {
  if (!state.running || !state.rhythmMode || state.watching) return;
  unlockAudio();
  const audioNow = currentAudioTime();
  if (audioNow < state.rhythmStartTime - state.beatDuration * 0.35) {
    setJudgeState("太早", "miss");
    updateBeatTip("先听完倒数，再开始记分。");
    return;
  }
  const elapsed = audioNow - state.rhythmStartTime;
  const beatFloat = elapsed / state.beatDuration;
  const nearestBeat = Math.round(beatFloat);
  if (nearestBeat < 0 || nearestBeat === state.lastJudgedBeat) return;
  const beatEvent = getBeatEventAt(nearestBeat);
  const plannedTime = rhythmBeatTime(nearestBeat);
  const beatDeltaMs = Math.abs(audioNow - plannedTime) * 1000;
  const windows = getJudgeWindows(beatEvent, getCurrentSong().bpm);
  state.lastJudgedBeat = nearestBeat;

  if (inputType && beatEvent.judgeable && inputType !== beatEvent.key && beatDeltaMs <= windows.judgeWindow) {
    applyRhythmJudge("Miss", point, beatEvent, "按错键");
    return;
  }
  if (!beatEvent.judgeable || beatDeltaMs > windows.judgeWindow) { applyRhythmJudge("Miss", point, beatEvent); }
  else if (beatDeltaMs <= windows.perfectWindow) { applyRhythmJudge("Perfect", point, beatEvent); }
  else { applyRhythmJudge("Good", point, beatEvent); }
}

function applyRhythmJudge(result, point, beatEvent, missLabel) {
  beatEvent = beatEvent || getBeatEventAt(state.lastJudgedBeat);
  missLabel = missLabel || "Miss";
  const config = {
    Perfect: { score: 3 + (beatEvent.scoreBonus || 0), comfort: 13 + (beatEvent.comfortBonus || 0), alert: -7 - Math.max(0, (beatEvent.alertEase || 0) - 4), color: "#b8ffb1", label: beatEvent.label === "重拍" ? "重拍 Perfect" : "Perfect" },
    Good:    { score: 1 + Math.max(0, (beatEvent.scoreBonus || 0) - 1), comfort: 6 + Math.max(0, (beatEvent.comfortBonus || 0) - 1), alert: -2 - Math.max(0, (beatEvent.alertEase || 0) - 4) * 0.5, color: "#fff4bd", label: beatEvent.label === "重拍" ? "重拍 Good" : "Good" },
    Miss:    { score: 0, comfort: -4, alert: 12, color: "#ff9b8a", label: missLabel },
  }[result];

  setJudgeState(result, result.toLowerCase());
  if (result === "Perfect") state.statsPerfect += 1;
  else if (result === "Good") state.statsGood += 1;
  else state.statsMiss += 1;

  state.combo = result === "Miss" ? 0 : state.combo + 1;
  if (state.combo > state.statsMaxCombo) state.statsMaxCombo = state.combo;
  if (result === "Miss") state.phraseMisses += 1;
  state.score += config.score + (state.combo > 0 && state.combo % 12 === 0 ? 4 : 0);
  state.comfort = clamp(state.comfort + config.comfort, 0, 100);
  state.alert = clamp(state.alert + config.alert, 0, 100);
  scoreEl.textContent = String(state.score);
  updateCareMeters();

  if (result !== "Miss") {
    spawnPlusOne(point, Math.max(0, config.score - 1), result === "Perfect");
    if (furPool) furPool.spawn(point, stage.getBoundingClientRect());
    playBrushAccent(result);
    flashCat(result);
    if (result === "Perfect") {
      spawnHint(config.label, config.color);
      if ([25, 50, 75, 100].includes(state.combo)) spawnComboMilestone(state.combo);
    }
  } else {
    playMissSound();
    spawnHint(config.label, config.color);
    flashCat("Miss");
  }
}

/* ---------- Pointer input ---------- */
function handlePointerStart(event) {
  if (!state.running) return;
  if (isUiInteractionTarget(event.target)) return;
  event.preventDefault();
  unlockAudio();
  const point = getPoint(event);
  state.pointerDown = true;
  state.grooming = pointInsideCat(point);
  state.lastPoint = state.grooming ? point : null;
  state.lastMoveAt = performance.now();
  moveComb(point);
  if (state.grooming && !state.watching && !state.rhythmMode) scheduleWatch();
  if (state.grooming && state.rhythmMode) judgeRhythmHit(point);
  if (state.watching && state.grooming && performance.now() >= state.warningGraceUntil) endGame();
}

function handlePointerMove(event) {
  if (isUiInteractionTarget(event.target)) return;
  const point = getPoint(event);
  moveComb(point);
  if (!state.running || !state.pointerDown) return;
  event.preventDefault();
  if (state.watching) {
    state.grooming = pointInsideCat(point);
    if (state.grooming && performance.now() >= state.warningGraceUntil) endGame();
    return;
  }
  if (!pointInsideCat(point)) {
    state.lastPoint = null;
    state.grooming = false;
    window.clearTimeout(state.nextWatchTimer);
    state.nextWatchTimer = 0;
    state.nextWatchAt = 0;
    stage.classList.remove("brushing");
    stopBrushLoop();
    return;
  }
  const shouldStartWatchTimer = !state.grooming;
  state.grooming = true;
  if (shouldStartWatchTimer && !state.rhythmMode) scheduleWatch();
  if (shouldStartWatchTimer && state.rhythmMode) judgeRhythmHit(point);
  stage.classList.add("brushing");
  if (!state.lastPoint) { state.lastPoint = point; return; }
  const dx = point.x - state.lastPoint.x;
  const dy = point.y - state.lastPoint.y;
  const moveDistance = Math.hypot(dx, dy);
  const now = performance.now();
  const deltaSeconds = Math.max(0.016, (now - state.lastMoveAt) / 1000);
  const speed = moveDistance / deltaSeconds;
  state.distance += moveDistance;
  state.lastPoint = point;
  state.lastMoveAt = now;
  updateBrushLoop(speed);
  if (!state.rhythmMode) updateCatMoodFromStroke(speed, moveDistance);
  if (state.rhythmMode) {
    const threshold = Math.max(18, getCurrentDifficulty().speedThreshold * 0.65);
    while (state.distance >= threshold) { state.distance -= threshold; judgeRhythmHit(point); }
  } else {
    const threshold = getCurrentDifficulty().speedThreshold;
    while (state.distance >= threshold) { state.distance -= threshold; addScore(point); }
    maybeEnterWatch();
  }
}

function handlePointerEnd() {
  state.pointerDown = false;
  state.grooming = false;
  state.lastPoint = null;
  state.distance = 0;
  state.combo = 0;
  state.activeRhythmKeys.clear();
  window.clearTimeout(state.nextWatchTimer);
  state.nextWatchTimer = 0;
  state.nextWatchAt = 0;
  stage.classList.remove("brushing");
  stopBrushLoop();
  updateCareMeters();
}

/* ---------- Keyboard input ---------- */
function handleRhythmKeyDown(event) {
  if (!state.running || !state.rhythmMode || event.repeat || isUiInteractionTarget(event.target)) return;
  const inputType = RHYTHM_KEY_BINDINGS[event.code];
  if (!inputType) return;
  event.preventDefault();
  unlockAudio();
  state.activeRhythmKeys.add(event.code);
  if (state.watching) {
    if (performance.now() >= state.warningGraceUntil) endGame();
    return;
  }
  state.pointerDown = true;
  state.grooming = true;
  judgeRhythmHit(createRhythmPoint(), inputType);
}

function handleRhythmKeyUp(event) {
  if (!RHYTHM_KEY_BINDINGS[event.code]) return;
  state.activeRhythmKeys.delete(event.code);
  if (!state.rhythmMode) return;
  if (state.activeRhythmKeys.size === 0) { state.pointerDown = false; state.grooming = false; }
}

/* ---------- Mode / Song / Cat / Tool management ---------- */
function setRhythmMode(enabled) {
  state.rhythmMode = enabled;
  modeBtn.textContent = enabled ? "节奏模式" : "自由模式";
  stage.classList.toggle("rhythm-mode", enabled);
  setJudgeState(enabled ? "预备" : "准备");
  updateBeatTip(enabled ? describeSongRhythm(getCurrentSong()) : "普通模式下，小猫会随机回头。");
  updateKeyHint(enabled ? describeRhythmKeys() : "普通模式主要用鼠标或触摸梳毛。");
  updateOverlayCopy();
  resetRoundVisuals();
}

function changeSong(direction) {
  /* 如果正在游戏中，确认后才切换，防止误触丢进度 */
  if (state.running && state.rhythmMode) {
    if (!confirm("正在节奏模式中，切换歌曲会结束当前游戏。确定吗？")) return;
    endGame();
  }
  state.songIndex = (state.songIndex + direction + songs.length) % songs.length;
  applySong();
  /* 空闲时静默切换，不弹 overlay 不重置状态 */
  if (!state.running) {
    setJudgeState(state.rhythmMode ? "预备" : "准备");
    updateBeatTip(state.rhythmMode ? describeSongRhythm(getCurrentSong()) : "普通模式下，小猫会随机回头。");
    if (state.rhythmMode) updateKeyHint(describeRhythmKeys());
  }
  if (state.rhythmMode && !state.running) {
    stopRhythmTrack();
    rhythmPreview.innerHTML = "";
  }
}

async function deleteCurrentSong() {
  const currentSong = getCurrentSong();
  if (currentSong.builtin) { spawnHint("内置歌曲不能删除", "#ffdf80"); return; }
  songs.splice(state.songIndex, 1);
  state.songIndex = Math.min(state.songIndex, songs.length - 1);
  await persistSongs();
  applySong();
  if (state.rhythmMode) resetRoundVisuals();
}

function changeCat(direction) {
  const wasRunning = state.running;
  state.pointerDown = false;
  state.grooming = false;
  state.activeRhythmKeys.clear();
  state.catIndex = (state.catIndex + direction + cats.length) % cats.length;
  applyCat({ resetToRelaxed: true });
  clearTimers();
  state.nextWatchAt = 0;
  state.watchReason = "normal";
  state.watchReward = 0;
  state.watchEligible = false;
  state.distance = 0;
  state.lastPoint = null;
  stopBrushLoop();
  if (state.rhythmMode) { stopRhythmTrack(); setJudgeState("预备"); updateBeatTip(describeSongRhythm(getCurrentSong())); if (wasRunning) startRhythmTrack(); }
  else { setJudgeState("准备"); }
  if (!wasRunning) { stage.classList.remove("watching", "jumpscare", "brushing"); stage.classList.add("relaxed"); }
  overlay.classList.toggle("show", !wasRunning);
}

async function deleteCurrentCat() {
  const currentCat = getCurrentCat();
  if (currentCat.builtin) { spawnHint("内置猫不能删除", "#ffdf80"); return; }
  if (cats.length <= 1) { spawnHint("至少留一只猫", "#ffdf80"); return; }
  cats.splice(state.catIndex, 1);
  state.catIndex = Math.min(state.catIndex, cats.length - 1);
  applyCat({ resetToRelaxed: true });
  await persistCats();
}

function changeTool(direction) { state.toolIndex = (state.toolIndex + direction + tools.length) % tools.length; applyTool(); }

function deleteCurrentTool() {
  if (tools.length <= 1) { spawnHint("至少留一个工具", "#ffdf80"); return; }
  tools.splice(state.toolIndex, 1);
  state.toolIndex = Math.min(state.toolIndex, tools.length - 1);
  applyTool();
}

function resetRoundVisuals() {
  state.running = false;
  state.pointerDown = false;
  state.grooming = false;
  state.watching = false;
  state.distance = 0;
  state.lastPoint = null;
  state.nextWatchAt = 0;
  state.watchReason = "normal";
  state.watchReward = 0;
  state.watchEligible = false;
  state.currentBeatKey = "rest";
  state.activeRhythmKeys.clear();
  clearTimers();
  stopRhythmTrack();
  stage.classList.remove("watching", "jumpscare", "brushing");
  stage.classList.add("relaxed");
  deathTitle.classList.remove("show");
  statsBlock.classList.remove("show");
  nextKeyIndicator.classList.remove("show");
  overlay.classList.add("show");
  updateOverlayCopy();
  startBtn.textContent = "开始";
  setCountInText("");
  setJudgeState(state.rhythmMode ? "预备" : "准备");
  updateBeatTip(state.rhythmMode ? describeSongRhythm(getCurrentSong()) : "普通模式下，小猫会随机回头。");
}

/* ---------- Cat modal ---------- */
function makeUploadedDifficulty() {
  return {
    ...BASE_DIFFICULTY,
    minRelaxedTime: randomBetween(1.9, 2.5), maxRelaxedTime: randomBetween(4.2, 5.0),
    minWarningTime: randomBetween(0.25, 0.35), maxWarningTime: randomBetween(0.5, 0.75),
    speedThreshold: Math.round(randomBetween(36, 48)), reactionTime: randomBetween(0.4, 0.55),
    alertGain: randomBetween(0.9, 1.2), alertDecay: randomBetween(0.65, 0.9),
  };
}

function fillCatForm(cat) {
  newCatName.value = cat?.name || "";
  newCatPersonality.value = cat?.personality || "";
  newCatRelax.value = "";
  newCatAngry.value = "";
}

function serializePatternForInput(pattern) {
  const tokenMap = { tap: "1", accent: "2", rest: "0", peek: "S", look: "L" };
  return pattern.map((token) => tokenMap[token] || token).join(",");
}

/* beatSource 模式切换：自动→隐藏pattern且移除required；手动→显示且加回required */
function applyBeatSourceMode(mode) {
  var pat = document.getElementById("newSongPattern");
  var label = pat ? pat.closest("label") : null;
  if (mode === "auto") {
    if (pat) { pat.removeAttribute("required"); pat.value = pat.value || ""; }
    if (label) label.style.display = "none";
  } else {
    if (pat) pat.setAttribute("required", "");
    if (label) label.style.display = "grid";
  }
}

function fillSongForm(song) {
  newSongName.value = song?.name || "";
  newSongBpm.value = String(song?.bpm || 100);
  newSongPattern.value = song ? serializePatternForInput(song.pattern) : "";
  newSongAudio.value = "";
  var source = song?.source || "manual";
  var radio = document.querySelector('input[name="beatSource"][value="' + source + '"]');
  if (radio) radio.checked = true;
  applyBeatSourceMode(source);
}

function openCatModal(mode, cat) {
  handlePointerEnd();
  state.editingCatId = cat?.id || null;
  catModalTitle.textContent = mode === "edit" ? "编辑猫咪" : "添加猫咪";
  catModalHint.textContent = mode === "edit" ? "可以改名字、介绍，也可以替换 0 / 1 状态图。" : "0 图是平静状态，1 图是警惕状态。";
  saveCatBtn.textContent = mode === "edit" ? "保存修改" : "添加猫咪";
  restoreCatBtn.hidden = !(mode === "edit" && cat?.builtin);
  fillCatForm(cat);
  catModal.classList.add("show");
  catModal.removeAttribute("inert");
  catModal.setAttribute("aria-hidden", "false");
  newCatName.focus();
}

function closeCatModal() {
  if (document.activeElement) document.activeElement.blur();
  state.editingCatId = null;
  catModal.classList.remove("show");
  catModal.setAttribute("inert", "");
  catModal.setAttribute("aria-hidden", "true");
  catForm.reset();
}

function openSongModal(mode, song) {
  handlePointerEnd();
  state.editingSongId = song?.id || null;
  songModalTitle.textContent = mode === "edit" ? "编辑歌曲" : "添加歌曲";
  songModalHint.textContent = mode === "edit" ? "可以替换 BPM、节拍和音频；留空则保留当前音频。" : "支持继续使用 1 / 2 / 0 / S / L 的旧节拍格式。";
  saveSongBtn.textContent = mode === "edit" ? "保存修改" : "添加歌曲";
  restoreSongBtn.hidden = !(mode === "edit" && song?.builtin);
  fillSongForm(song);
  /* 节拍来源切换事件：统一用 applyBeatSourceMode 管理 required 和显示 */
  document.querySelectorAll('input[name="beatSource"]').forEach(function(r) {
    r.onchange = function() { applyBeatSourceMode(r.value); };
  });
  songModal.classList.add("show");
  songModal.removeAttribute("inert");
  songModal.setAttribute("aria-hidden", "false");
  newSongName.focus();
}

function closeSongModal() {
  if (document.activeElement) document.activeElement.blur();
  state.editingSongId = null;
  songModal.classList.remove("show");
  songModal.setAttribute("inert", "");
  songModal.setAttribute("aria-hidden", "true");
  songForm.reset();
}

function parseSongPatternInput(input) {
  const trimmed = input.trim();
  if (!trimmed) throw new Error("先填一串节拍，比如 1,0,2,S,1,0,L,0");
  const rawTokens = /[\s,|/]+/.test(trimmed) ? trimmed.split(/[\s,|/]+/).filter(Boolean) : trimmed.replace(/\s+/g, "").split("");
  if (!rawTokens.length) throw new Error("节拍序列不能为空");
  const pattern = rawTokens.map((token) => {
    const normalized = parseBeatToken(token);
    if (!normalized) throw new Error(`不认识 "${token}"。可用 1、2、0、L、S`);
    return normalized;
  });
  if (pattern.length < 4) throw new Error("至少需要 4 拍，小猫才来得及进入状态。");
  return pattern;
}

async function saveCatFromForm() {
  const name = newCatName.value.trim() || "自定义猫";
  const personality = newCatPersonality.value.trim() || "神秘的梳毛客人。";
  const relaxFile = newCatRelax.files?.[0] || null;
  const angryFile = newCatAngry.files?.[0] || null;

  if (state.editingCatId) {
    const index = cats.findIndex((cat) => cat.id === state.editingCatId);
    const currentCat = cats[index];
    if (!currentCat) return;
    let relaxBlob = currentCat.relaxBlob || null;
    let angryBlob = currentCat.angryBlob || null;
    let relaxImg = currentCat.relaxImg;
    let angryImg = currentCat.angryImg;
    if (relaxFile) { relaxBlob = relaxFile; relaxImg = createManagedUrl(relaxBlob); }
    if (angryFile) { angryBlob = angryFile; angryImg = createManagedUrl(angryBlob); }
    const visuals = await combineStateImages(angryImg, relaxImg);
    cats[index] = normalizeCatDefinition({ ...currentCat, name, personality, relaxBlob, angryBlob, relaxImg, angryImg, combinedImg: visuals.src, displayAspectRatio: visuals.aspectRatio, override: currentCat.builtin ? true : currentCat.override });
    await persistCats();
    applyCat({ resetToRelaxed: true });
    closeCatModal();
    spawnHint("猫咪资料已更新", "#9fdfeb");
    return;
  }

  if (!relaxFile || !angryFile) throw new Error("新增猫咪时需要同时提供平静图和警惕图。");
  const relaxBlob = relaxFile;
  const angryBlob = angryFile;
  const relaxImg = createManagedUrl(relaxBlob);
  const angryImg = createManagedUrl(angryBlob);
  const visuals = await combineStateImages(angryImg, relaxImg);
  cats.push(normalizeCatDefinition({ id: createId("custom-cat"), name, personality, relaxBlob, angryBlob, relaxImg, angryImg, combinedImg: visuals.src, displayAspectRatio: visuals.aspectRatio, difficulty: makeUploadedDifficulty(), custom: true, builtin: false, override: false }));
  state.catIndex = cats.length - 1;
  await persistCats();
  applyCat({ resetToRelaxed: true });
  closeCatModal();
  spawnHint("新猫入场", "#9fdfeb");
}

async function restoreCurrentCatDefault() {
  if (!state.editingCatId) return;
  const spec = BUILTIN_CAT_SPECS.find((item) => item.id === state.editingCatId);
  if (!spec) return;
  await idbDelete(DB_CAT_STORE, spec.id);
  await hydrateGameData();
  state.catIndex = cats.findIndex((cat) => cat.id === spec.id);
  applyCat({ resetToRelaxed: true });
  closeCatModal();
  spawnHint("已恢复默认猫咪资料", "#fff4bd");
}

async function saveSongFromForm() {
  const bpm = Number(newSongBpm.value);
  if (!Number.isFinite(bpm) || bpm < 40 || bpm > 220) throw new Error("BPM 请填 40 到 220。");
  const beatSourceRadio = document.querySelector('input[name="beatSource"]:checked');
  const beatSource = beatSourceRadio ? beatSourceRadio.value : "manual";

  /* 自动模式：跳过 required 校验，先移除 required 再 checkValidity */
  if (beatSource === "auto") {
    newSongPattern.removeAttribute("required");
  }

  /* 自动模式且 pattern 为空 → 用预设 pattern 兜底，避免 parseSongPatternInput("") 抛异常 */
  var patternInputRaw = newSongPattern.value.trim();
  var pattern;
  if (beatSource === "auto" && !patternInputRaw) {
    pattern = generateFallbackPattern(bpm);
  } else {
    pattern = parseSongPatternInput(patternInputRaw || newSongPattern.placeholder);
  }

  const name = newSongName.value.trim() || "自定义节拍";
  const audioFile = newSongAudio.files?.[0] || null;
  const userProvidedPattern = beatSource === "manual" && patternInputRaw.length > 0;

  /* 解码音频（容错：失败也不影响歌曲保存） */
  var audioBlob = audioFile || null;
  var audioBuffer = null;
  if (audioFile) {
    setJudgeState("解码中", "good");
    updateBeatTip("正在解码音频文件...");
    try { audioBuffer = await decodeAudioBlob(audioFile); }
    catch (e) { console.warn("音频解码异常，将保存无音频的歌曲", e); audioBuffer = null; }
  }

  if (state.editingSongId) {
    const index = songs.findIndex(function(s) { return s.id === state.editingSongId; });
    const currentSong = songs[index];
    if (!currentSong) return;
    if (!audioFile) { audioBlob = currentSong.audioBlob || null; audioBuffer = currentSong.audioBuffer || null; }
    songs[index] = normalizeSongDefinition({ ...currentSong, name, bpm: Math.round(bpm), pattern, audioBlob: audioBlob, audioBuffer: audioBuffer, patternProvided: userProvidedPattern, source: beatSource, override: currentSong.builtin ? true : currentSong.override });
    await persistSongs();
    applySong();
    closeSongModal();
    if (state.rhythmMode) resetRoundVisuals();
    setJudgeState("已保存", "perfect");
    spawnHint("歌曲配置已更新", "#9fdfeb");
    return;
  }

  songs.push(normalizeSongDefinition({ id: createId("custom-song"), name, bpm: Math.round(bpm), pattern, custom: true, builtin: false, override: false, audioBlob: audioBlob, audioBuffer: audioBuffer, patternProvided: userProvidedPattern, source: beatSource }));
  state.songIndex = songs.length - 1;
  await persistSongs();
  applySong();
  closeSongModal();
  if (state.rhythmMode) resetRoundVisuals();
  setJudgeState("已保存", "perfect");
  spawnHint("新歌入场", "#9fdfeb");
}

async function restoreCurrentSongDefault() {
  if (!state.editingSongId) return;
  await idbDelete(DB_SONG_STORE, state.editingSongId);
  await hydrateGameData();
  state.songIndex = songs.findIndex((song) => song.id === state.editingSongId);
  applySong();
  closeSongModal();
  if (state.rhythmMode) resetRoundVisuals();
  spawnHint("已恢复默认歌曲", "#fff4bd");
}

function addUploadedTool(file) {
  const url = createManagedUrl(file);
  const img = new Image();
  img.onload = () => {
    tools.push({ name: file.name.replace(/\.[^.]+$/, "") || "自定义工具", img: url, cursorHotspot: `${Math.round(img.naturalWidth / 2)} ${Math.round(img.naturalHeight / 2)}` });
    state.toolIndex = tools.length - 1;
    applyTool();
  };
  img.src = url;
}

function toggleMute() {
  state.muted = !state.muted;
  if (state.muted) stopBrushLoop();
  if (state.songGain) state.songGain.gain.setTargetAtTime(state.muted ? 0.0001 : 0.18, state.audio?.currentTime || 0, 0.03);
  if (state.muted) { stopSongAudio(); }
  else if (state.running && state.rhythmMode) { startSongAudio(state.songStartAudioTime, state.audioOffset || 0); }
  updateMuteButton();
}

/* ---------- File:// protocol check ---------- */
(function checkProtocol() {
  if (location.protocol === "file:") {
    var banner = document.createElement("div");
    banner.className = "file-warning";
    banner.textContent = "⚠ file:// 协议运行中。自动节拍识别、IndexedDB、Web Audio 解码等功能可能受限。请用 Live Server 或 http-server 打开。";
    document.body.insertBefore(banner, document.body.firstChild);
    console.warn("file:// 协议检测：CDN 模块、Web Audio 解码、IndexedDB 可能受限。建议用本地服务器打开。");
  }
})();

/* ---------- Image preloader (silent, no <link rel=preload>) ---------- */
(function preloadAllCatImages() {
  BUILTIN_CAT_SPECS.forEach(function(spec) {
    [spec.relaxImg, spec.angryImg].forEach(function(src) {
      var img = new Image();
      try { img.src = decodeURI(src); } catch(e) { img.src = src; }
    });
  });
  var combImg = new Image();
  combImg.src = "assets/comb.png";
})();

/* ---------- Bootstrap ---------- */
bestEl.textContent = String(state.best);
updateMuteButton();
updateCareMeters();
startBtn.disabled = true;
startBtn.textContent = "加载中...";
bootstrap();

async function bootstrap() {
  try {
    state.db = await openDatabase();
    await migrateLegacyStorageIfNeeded();
    await hydrateGameData();
    applyTool();
    applyCat({ resetToRelaxed: true });
    applySong();
    resetRoundVisuals();
    if (state.migrationNotice) updateBeatTip(state.migrationNotice);
    state.initialized = true;
    startBtn.disabled = false;
    if (!state.running) startBtn.textContent = "开始";
    if (state.pendingStart) { state.pendingStart = false; startGame(); }
  } catch (error) {
    console.error("Failed to initialize game", error);
    await initializeFallbackData();
    state.initFailed = true;
    setJudgeState("降级启动", "good");
    updateBeatTip("本地存储初始化失败，已切到内置数据。");
    state.initialized = true;
    startBtn.disabled = false;
    if (!state.running) startBtn.textContent = "开始";
    if (state.pendingStart) { state.pendingStart = false; startGame(); }
  }
}

async function initializeFallbackData() {
  const [builtCats, builtSongs] = await Promise.all([buildBuiltinCats([]), buildSongs([])]);
  cats.splice(0, cats.length, ...builtCats);
  songs.splice(0, songs.length, ...builtSongs);
  state.catIndex = 0;
  state.songIndex = 0;
  applyTool();
  applyCat({ resetToRelaxed: true });
  applySong();
  resetRoundVisuals();
}

/* ---------- Event binding ---------- */
startBtn.addEventListener("click", startGame);
muteBtn.addEventListener("click", toggleMute);
modeBtn.addEventListener("click", () => setRhythmMode(!state.rhythmMode));
prevSongBtn.addEventListener("click", () => changeSong(-1));
nextSongBtn.addEventListener("click", () => changeSong(1));
editSongBtn.addEventListener("click", () => openSongModal("edit", getCurrentSong()));
importSongBtn.addEventListener("click", () => openSongModal("add"));
deleteSongBtn.addEventListener("click", () => { void deleteCurrentSong(); });
prevCatBtn.addEventListener("click", () => changeCat(-1));
nextCatBtn.addEventListener("click", () => changeCat(1));
editCatBtn.addEventListener("click", () => openCatModal("edit", getCurrentCat()));
addCatBtn.addEventListener("click", () => openCatModal("add"));
deleteCatBtn.addEventListener("click", () => { void deleteCurrentCat(); });
cancelCatBtn.addEventListener("click", closeCatModal);
restoreCatBtn.addEventListener("click", () => { void restoreCurrentCatDefault(); });
catModal.addEventListener("mousedown", (event) => { if (event.target === catModal) closeCatModal(); });
catModal.addEventListener("touchstart", (event) => { if (event.target === catModal) closeCatModal(); });
catForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  try { await saveCatFromForm(); }
  catch (error) { const message = error instanceof Error ? error.message : "保存猫咪失败"; setJudgeState("保存失败", "miss"); updateBeatTip(message); spawnHint(message, "#ff9b8a"); }
});
cancelSongBtn.addEventListener("click", closeSongModal);
restoreSongBtn.addEventListener("click", () => { void restoreCurrentSongDefault(); });
songModal.addEventListener("mousedown", (event) => { if (event.target === songModal) closeSongModal(); });
songModal.addEventListener("touchstart", (event) => { if (event.target === songModal) closeSongModal(); });
songForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  try { await saveSongFromForm(); }
  catch (error) { const message = error instanceof Error ? error.message : "保存歌曲失败"; setJudgeState("保存失败", "miss"); updateBeatTip(message); spawnHint(message, "#ff9b8a"); }
});
window.addEventListener("keydown", (event) => {
  handleRhythmKeyDown(event);
  if (event.key === "Escape" && catModal.classList.contains("show")) closeCatModal();
  if (event.key === "Escape" && songModal.classList.contains("show")) closeSongModal();
});
window.addEventListener("keyup", handleRhythmKeyUp);

prevToolBtn.addEventListener("click", () => changeTool(-1));
nextToolBtn.addEventListener("click", () => changeTool(1));
deleteToolBtn.addEventListener("click", deleteCurrentTool);
toolUpload.addEventListener("change", () => { const file = toolUpload.files?.[0]; if (file) addUploadedTool(file); toolUpload.value = ""; });

catStateImg.addEventListener("load", () => {
  const currentCat = getCurrentCat();
  if (!currentCat) return;
  const fallbackRatio = catStateImg.naturalWidth && catStateImg.naturalHeight ? catStateImg.naturalWidth / catStateImg.naturalHeight : null;
  const ratio = currentCat.displayAspectRatio || fallbackRatio;
  if (ratio) catZone.style.aspectRatio = String(ratio);
});

stage.addEventListener("mousedown", handlePointerStart);
stage.addEventListener("mousemove", handlePointerMove);
window.addEventListener("mouseup", handlePointerEnd);

stage.addEventListener("touchstart", handlePointerStart, { passive: false });
stage.addEventListener("touchmove", handlePointerMove, { passive: false });
window.addEventListener("touchend", handlePointerEnd);
window.addEventListener("touchcancel", handlePointerEnd);

stage.addEventListener("mouseleave", () => { combGhost.classList.remove("visible"); });
</script>
